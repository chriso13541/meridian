<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meridian</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0d0d10;
    --surface:  #13131a;
    --border:   rgba(255,255,255,0.07);
    --border2:  rgba(255,255,255,0.12);
    --t1:       #edeae3;
    --t2:       #7a7870;
    --t3:       #3e3d39;
    --mono:     'IBM Plex Mono', monospace;
    --sans:     'IBM Plex Sans', sans-serif;
    --teal:     #1D9E75;
    --teal-bg:  rgba(29,158,117,0.12);
    --blue:     #378ADD;
    --blue-bg:  rgba(55,138,221,0.12);
    --gray-bg:  rgba(136,135,128,0.1);
    --amber:    #EF9F27;
    --r:        8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--t1);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HOME VIEW ──────────────────────────────────────────── */
  #home {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    transition: opacity 0.2s;
  }
  #home.hidden { opacity: 0; pointer-events: none; position: absolute; }

  .logo-block { text-align: center; margin-bottom: 2.5rem; }
  .logo {
    font-family: var(--mono);
    font-size: 2.4rem;
    font-weight: 500;
    letter-spacing: -1px;
    color: var(--t1);
    line-height: 1;
  }
  .logo-dot { color: var(--teal); }
  .logo-sub {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--t3);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 0.6rem;
  }

  .search-wrap {
    width: 100%;
    max-width: 600px;
    position: relative;
  }
  .search-input {
    width: 100%;
    height: 52px;
    padding: 0 52px 0 20px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--r);
    font-family: var(--sans);
    font-size: 16px;
    color: var(--t1);
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input::placeholder { color: var(--t3); }
  .search-input:focus { border-color: rgba(255,255,255,0.22); }

  .search-btn {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    color: var(--t2);
    transition: color 0.15s;
    display: flex;
    align-items: center;
  }
  .search-btn:hover { color: var(--t1); }
  .search-btn svg { width: 20px; height: 20px; }

  .tier-legend {
    display: flex;
    gap: 20px;
    margin-top: 1.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: var(--t2);
    font-family: var(--mono);
  }
  .ldot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .ldot-cached  { background: var(--teal); }
  .ldot-indexed { background: var(--blue); }
  .ldot-known   { background: var(--t3);   }

  /* ── RESULTS VIEW ───────────────────────────────────────── */
  #results {
    display: none;
    flex-direction: column;
    min-height: 100vh;
  }
  #results.visible { display: flex; }

  .rh {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(13,13,16,0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .rh-logo {
    font-family: var(--mono);
    font-size: 1.15rem;
    font-weight: 500;
    color: var(--t1);
    cursor: pointer;
    flex-shrink: 0;
    text-decoration: none;
    white-space: nowrap;
  }
  .rh-logo:hover { color: var(--t1); }
  .rh-logo .logo-dot { color: var(--teal); }

  .rh-search {
    flex: 1;
    max-width: 540px;
    position: relative;
  }
  .rh-input {
    width: 100%;
    height: 38px;
    padding: 0 38px 0 14px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 6px;
    font-family: var(--sans);
    font-size: 14px;
    color: var(--t1);
    outline: none;
    transition: border-color 0.15s;
  }
  .rh-input:focus { border-color: rgba(255,255,255,0.2); }
  .rh-btn {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--t2);
    padding: 2px;
    display: flex;
    align-items: center;
    transition: color 0.15s;
  }
  .rh-btn:hover { color: var(--t1); }
  .rh-btn svg { width: 16px; height: 16px; }

  .rb {
    display: flex;
    flex: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px 24px 48px;
    gap: 32px;
    width: 100%;
  }

  /* ── MAIN COLUMN ─────────────────────────────────────────── */
  .main-col { flex: 1; min-width: 0; }

  .cold-notice {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: rgba(239,159,39,0.07);
    border: 1px solid rgba(239,159,39,0.18);
    border-radius: var(--r);
    padding: 10px 14px;
    margin-bottom: 16px;
    font-size: 13px;
    color: #c4a05a;
    line-height: 1.55;
  }
  .cold-notice svg { flex-shrink: 0; width: 15px; height: 15px; margin-top: 1px; }
  .cold-notice.hidden { display: none; }

  .meta-line {
    font-size: 12px;
    color: var(--t3);
    font-family: var(--mono);
    margin-bottom: 16px;
  }

  /* ── RESULT CARD ─────────────────────────────────────────── */
  .result {
    padding: 14px 0 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .result:last-child { border-bottom: none; }
  .result:hover .result-title { text-decoration: underline; text-decoration-color: var(--t2); }

  .result-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 3px;
  }
  .result-domain {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--t2);
  }
  .tbadge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-family: var(--mono);
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 4px;
    letter-spacing: 0.02em;
    flex-shrink: 0;
  }
  .tbadge-dot { width: 5px; height: 5px; border-radius: 50%; }
  .tbadge-cached  { background: var(--teal-bg); color: #3ecfa0; }
  .tbadge-cached .tbadge-dot  { background: var(--teal); }
  .tbadge-indexed { background: var(--blue-bg); color: #67b4f5; }
  .tbadge-indexed .tbadge-dot { background: var(--blue); }
  .tbadge-known   { background: var(--gray-bg); color: var(--t2); }
  .tbadge-known .tbadge-dot   { background: var(--t3); }

  .result-title {
    font-size: 17px;
    font-weight: 400;
    color: var(--t1);
    line-height: 1.35;
    margin-bottom: 4px;
  }
  .result-url {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--t3);
    margin-bottom: 5px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .result-snippet {
    font-size: 13px;
    color: var(--t2);
    line-height: 1.65;
  }
  .result-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 7px;
  }
  .rtag {
    font-size: 11px;
    font-family: var(--mono);
    padding: 2px 7px;
    border-radius: 4px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--t3);
  }

  .pagination {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 20px 0 0;
    font-size: 13px;
    color: var(--t2);
  }
  .page-btn {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--t2);
    padding: 6px 14px;
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .page-btn:hover { border-color: var(--border2); color: var(--t1); }
  .page-btn:disabled { opacity: 0.3; cursor: default; }

  .loading-row {
    padding: 32px 0;
    text-align: center;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--t3);
  }

  /* ── SIDEBAR ─────────────────────────────────────────────── */
  .side-col {
    width: 210px;
    flex-shrink: 0;
    padding-top: 4px;
  }
  @media (max-width: 780px) { .side-col { display: none; } }

  .side-section { margin-bottom: 24px; }
  .side-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--t3);
    margin-bottom: 10px;
  }

  .interest-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .interest-lbl {
    font-size: 12px;
    color: var(--t2);
    width: 82px;
    flex-shrink: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .interest-track {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .interest-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--teal);
    transition: width 0.6s ease;
  }
  .interest-pct {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--t3);
    min-width: 24px;
    text-align: right;
  }

  .preload-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
  }
  .preload-row:last-child { border-bottom: none; }
  .pldot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .pldot-done    { background: var(--teal); }
  .pldot-loading { background: var(--amber); animation: blink 1s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .pl-url {
    flex: 1;
    font-family: var(--mono);
    color: var(--t3);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .pl-time { font-family: var(--mono); color: var(--t3); }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
    font-size: 12px;
    border-bottom: 1px solid var(--border);
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-lbl { color: var(--t2); }
  .stat-val { font-family: var(--mono); font-weight: 500; color: var(--t1); }

  /* ── EMPTY / ERROR ───────────────────────────────────────── */
  .empty {
    padding: 48px 0;
    text-align: center;
    color: var(--t2);
    font-size: 14px;
    line-height: 2;
  }
  .empty strong { color: var(--t1); display: block; font-size: 16px; margin-bottom: 6px; }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════
     HOME VIEW
══════════════════════════════════════════════════════════════ -->
<div id="home">
  <div class="logo-block">
    <div class="logo">meridian<span class="logo-dot">.</span></div>
    <div class="logo-sub">private · demand-driven · tracker-free</div>
  </div>

  <div class="search-wrap">
    <input class="search-input" id="homeQ" type="search"
           placeholder="search your web…" autocomplete="off" spellcheck="false">
    <button class="search-btn" id="homeBtn" aria-label="search">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"
           stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>
  </div>

  <div class="tier-legend">
    <div class="legend-item"><div class="ldot ldot-cached"></div>cached &amp; clean</div>
    <div class="legend-item"><div class="ldot ldot-indexed"></div>indexed only</div>
    <div class="legend-item"><div class="ldot ldot-known"></div>known, unvisited</div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════
     RESULTS VIEW
══════════════════════════════════════════════════════════════ -->
<div id="results">
  <!-- sticky header -->
  <header class="rh">
    <a class="rh-logo" id="backHome" href="#">
      meridian<span class="logo-dot">.</span>
    </a>
    <div class="rh-search">
      <input class="rh-input" id="rhQ" type="search"
             autocomplete="off" spellcheck="false">
      <button class="rh-btn" id="rhBtn" aria-label="search">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- body: main + sidebar -->
  <div class="rb">
    <div class="main-col">
      <div class="cold-notice hidden" id="coldNotice">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="coldText">Cold search — fetching fresh results…</span>
      </div>

      <div class="meta-line" id="metaLine"></div>
      <div id="resultsList"></div>

      <div class="pagination" id="pagination" style="display:none">
        <button class="page-btn" id="prevBtn">← prev</button>
        <span id="pageLabel" style="font-family:var(--mono);font-size:12px"></span>
        <button class="page-btn" id="nextBtn">next →</button>
      </div>
    </div>

    <aside class="side-col">
      <!-- Interest graph -->
      <div class="side-section">
        <div class="side-label">interest graph</div>
        <div id="interestList"></div>
      </div>

      <!-- Pre-fetch status -->
      <div class="side-section">
        <div class="side-label">pre-fetching</div>
        <div id="preloadList"></div>
      </div>

      <!-- Crawler stats -->
      <div class="side-section">
        <div class="side-label">index</div>
        <div id="statsList"></div>
      </div>
    </aside>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ── state ─────────────────────────────────────────────────
  let currentQuery = '';
  let currentPage  = 1;
  let lastResults  = [];
  let isColdSearch = true;

  // Interest profile: built up from search/click history in localStorage
  const interests = JSON.parse(localStorage.getItem('mrd_interests') || '{}');

  // ── helpers ───────────────────────────────────────────────
  function $(id) { return document.getElementById(id); }

  function showHome() {
    $('home').classList.remove('hidden');
    $('results').classList.remove('visible');
    document.title = 'Meridian';
  }

  function showResults() {
    $('home').classList.add('hidden');
    $('results').classList.add('visible');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;');
  }

  function relTime(ageSecs) {
    if (ageSecs < 60)        return 'just now';
    if (ageSecs < 3600)      return Math.floor(ageSecs/60) + 'm ago';
    if (ageSecs < 86400)     return Math.floor(ageSecs/3600) + 'h ago';
    if (ageSecs < 86400*30)  return Math.floor(ageSecs/86400) + 'd ago';
    return Math.floor(ageSecs/86400/30) + 'mo ago';
  }

  function tierBadge(tier) {
    const map = {
      cached:  ['cached',  'cached'],
      indexed: ['indexed', 'indexed'],
      known:   ['known',   'known'],
    };
    const [label, cls] = map[tier] || ['unknown','known'];
    return `<span class="tbadge tbadge-${cls}">
              <span class="tbadge-dot"></span>${label}
            </span>`;
  }

  function domain(url) {
    try { return new URL(url).hostname.replace(/^www\./, ''); }
    catch { return url; }
  }

  // ── interest graph ────────────────────────────────────────
  function bumpInterest(terms) {
    terms.forEach(t => {
      interests[t] = (interests[t] || 0) + 1;
    });
    localStorage.setItem('mrd_interests', JSON.stringify(interests));
  }

  function renderInterests(query) {
    // seed from current query
    const words = query.toLowerCase().split(/\s+/).filter(w => w.length > 3);
    words.forEach(w => bumpInterest([w]));

    const sorted = Object.entries(interests)
      .sort((a,b) => b[1]-a[1])
      .slice(0, 6);
    const max = sorted[0]?.[1] || 1;

    const colors = ['#1D9E75','#378ADD','#1D9E75','#5DCAA5','#378ADD','#1D9E75'];
    $('interestList').innerHTML = sorted.map(([term, count], i) => {
      const pct = Math.round((count/max)*100);
      return `<div class="interest-row">
        <div class="interest-lbl">${escHtml(term)}</div>
        <div class="interest-track">
          <div class="interest-fill" style="width:${pct}%;background:${colors[i%colors.length]}"></div>
        </div>
        <div class="interest-pct">${pct}</div>
      </div>`;
    }).join('') || '<div style="font-size:12px;color:var(--t3)">browsing more to build profile…</div>';
  }

  // ── preload panel ─────────────────────────────────────────
  function renderPreloads(results) {
    const top3 = results.slice(0, 3);
    const statuses = top3.map(r => ({ url: r.url, done: r.tier === 'cached', time: null }));

    function render() {
      $('preloadList').innerHTML = statuses.map(s => `
        <div class="preload-row">
          <div class="pldot ${s.done ? 'pldot-done' : 'pldot-loading'}"></div>
          <div class="pl-url">${domain(s.url)}</div>
          <div class="pl-time">${s.time ? s.time+'ms' : '—'}</div>
        </div>`).join('');
    }
    render();

    // simulate prefetch for non-cached results
    statuses.forEach((s, i) => {
      if (!s.done) {
        const delay = 800 + i * 600 + Math.random() * 400;
        setTimeout(() => {
          const t0 = Date.now();
          fetch('/api/fetch?url=' + encodeURIComponent(s.url), { method: 'POST' })
            .then(() => {
              s.done = true;
              s.time = Date.now() - t0;
              render();
            })
            .catch(() => {
              s.done = true;
              s.time = '—';
              render();
            });
        }, delay);
      } else {
        s.time = Math.floor(20 + Math.random() * 40);
      }
    });
    render();
  }

  // ── crawler stats ─────────────────────────────────────────
  function renderStats(data) {
    const fmt = n => n >= 1e6 ? (n/1e6).toFixed(1)+'M'
                   : n >= 1e3 ? (n/1e3).toFixed(1)+'k'
                   : String(n);
    $('statsList').innerHTML = `
      <div class="stat-row"><span class="stat-lbl">indexed</span><span class="stat-val">${fmt(data.total_indexed||0)}</span></div>
      <div class="stat-row"><span class="stat-lbl">cached</span><span class="stat-val">${fmt(data.total_cached||0)}</span></div>
      <div class="stat-row"><span class="stat-lbl">known</span><span class="stat-val">${fmt(data.total_known||0)}</span></div>
      <div class="stat-row"><span class="stat-lbl">query</span><span class="stat-val">${data.elapsed_ms||0}ms</span></div>`;
  }

  // ── render results list ───────────────────────────────────
  function renderResults(results) {
    if (!results.length) {
      $('resultsList').innerHTML = `
        <div class="empty">
          <strong>No results found</strong>
          Try a broader query, or Meridian may not have indexed this area yet.<br>
          Your first searches seed the index — keep exploring.
        </div>`;
      $('pagination').style.display = 'none';
      return;
    }

    $('resultsList').innerHTML = results.map((r, i) => `
      <div class="result" data-url="${escHtml(r.url)}" data-idx="${i}">
        <div class="result-top">
          <span class="result-domain">${escHtml(domain(r.url))}</span>
          ${tierBadge(r.tier)}
        </div>
        <div class="result-title">${escHtml(r.title || r.url)}</div>
        <div class="result-url">${escHtml(r.url)}</div>
        ${r.snippet ? `<div class="result-snippet">${escHtml(r.snippet)}</div>` : ''}
        <div class="result-tags">
          ${r.tags.map(t=>`<span class="rtag">${escHtml(t)}</span>`).join('')}
          <span class="rtag">${relTime(r.age_secs)}</span>
        </div>
      </div>`).join('');

    // click handler: trigger fetch then navigate
    $('resultsList').querySelectorAll('.result').forEach(el => {
      el.addEventListener('click', () => {
        const url = el.dataset.url;
        bumpInterest(currentQuery.toLowerCase().split(/\s+/).filter(w=>w.length>3));
        // fire-and-forget cache request, then navigate
        fetch('/api/fetch?url=' + encodeURIComponent(url), { method: 'POST' }).catch(()=>{});
        window.open(url, '_blank', 'noopener');
      });
    });

    $('pagination').style.display = results.length >= 25 ? 'flex' : 'none';
    $('pageLabel').textContent = 'page ' + currentPage;
    $('prevBtn').disabled = currentPage <= 1;
    $('nextBtn').disabled = results.length < 25;
  }

  // ── main search function ──────────────────────────────────
  async function doSearch(query, page) {
    query = (query || '').trim();
    if (!query) return;

    currentQuery = query;
    currentPage  = page || 1;

    $('rhQ').value = query;
    document.title = query + ' — Meridian';
    showResults();

    // cold notice on first search or new query
    $('coldNotice').classList.remove('hidden');
    $('coldText').textContent = 'Querying index and refreshing stale results…';
    $('resultsList').innerHTML = '<div class="loading-row">searching…</div>';
    $('metaLine').textContent = '';

    try {
      const resp = await fetch(
        `/api/search?q=${encodeURIComponent(query)}&page=${currentPage}`
      );
      const data = await resp.json();
      lastResults = data.results;

      const coldCount = data.results.filter(r => r.tier !== 'cached').length;
      if (coldCount === 0) {
        $('coldNotice').classList.add('hidden');
      } else {
        $('coldText').textContent =
          `${coldCount} result${coldCount>1?'s':''} not yet cached — click to fetch a clean copy.`;
      }

      $('metaLine').textContent =
        `~${(data.total_indexed||0).toLocaleString()} indexed pages · ${data.elapsed_ms}ms`;

      renderResults(data.results);
      renderPreloads(data.results);
      renderInterests(query);
      renderStats(data);

    } catch (err) {
      $('resultsList').innerHTML = `
        <div class="empty">
          <strong>Could not reach Meridian server</strong>
          Make sure the Rust backend is running on port 3000.
        </div>`;
      $('coldNotice').classList.add('hidden');
    }
  }

  // ── event wiring ──────────────────────────────────────────
  $('homeBtn').addEventListener('click', () => doSearch($('homeQ').value));
  $('homeQ').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch($('homeQ').value); });

  $('rhBtn').addEventListener('click', () => doSearch($('rhQ').value));
  $('rhQ').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch($('rhQ').value); });

  $('backHome').addEventListener('click', e => { e.preventDefault(); showHome(); });

  $('prevBtn').addEventListener('click', () => doSearch(currentQuery, currentPage - 1));
  $('nextBtn').addEventListener('click', () => doSearch(currentQuery, currentPage + 1));

  // Pick up ?q= from URL on load (useful for bookmarking a search)
  const urlQ = new URLSearchParams(location.search).get('q');
  if (urlQ) doSearch(urlQ);

})();
</script>
</body>
</html>
